<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="pen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Journal body (open book shape) -->
  <rect x="8" y="14" width="48" height="36" rx="4" fill="#1e1b4b" opacity="0.85"/>

  <!-- Left page -->
  <rect x="9" y="15" width="22" height="34" rx="2" fill="#ede9fe" opacity="0.15"/>

  <!-- Right page -->
  <rect x="33" y="15" width="22" height="34" rx="2" fill="#ede9fe" opacity="0.1"/>

  <!-- Spine line -->
  <line x1="32" y1="15" x2="32" y2="49" stroke="#c4b5fd" stroke-width="1.5" opacity="0.6"/>

  <!-- Ruled lines left page -->
  <line x1="12" y1="24" x2="29" y2="24" stroke="#c4b5fd" stroke-width="1" opacity="0.5"/>
  <line x1="12" y1="29" x2="29" y2="29" stroke="#c4b5fd" stroke-width="1" opacity="0.5"/>
  <line x1="12" y1="34" x2="29" y2="34" stroke="#c4b5fd" stroke-width="1" opacity="0.5"/>
  <line x1="12" y1="39" x2="24" y2="39" stroke="#c4b5fd" stroke-width="1" opacity="0.5"/>

  <!-- Ruled lines right page -->
  <line x1="35" y1="24" x2="52" y2="24" stroke="#c4b5fd" stroke-width="1" opacity="0.5"/>
  <line x1="35" y1="29" x2="52" y2="29" stroke="#c4b5fd" stroke-width="1" opacity="0.5"/>
  <line x1="35" y1="34" x2="52" y2="34" stroke="#c4b5fd" stroke-width="1" opacity="0.5"/>

  <!-- Pen -->
  <g transform="rotate(-35, 46, 44)">
    <rect x="43" y="28" width="5.5" height="18" rx="1.5" fill="url(#pen)"/>
    <!-- Pen tip -->
    <polygon points="43,46 48.5,46 45.75,52" fill="#d97706"/>
    <!-- Pen cap -->
    <rect x="43" y="27" width="5.5" height="4" rx="1" fill="#fbbf24"/>
    <!-- Pen clip -->
    <rect x="47.5" y="27" width="1" height="14" rx="0.5" fill="#f59e0b"/>
  </g>

  <!-- Glow dot at pen tip -->
  <circle cx="40" cy="52" r="2.5" fill="#fde68a" opacity="0.8"/>
</svg>